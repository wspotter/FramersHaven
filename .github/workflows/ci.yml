name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install Node lockfile dependencies
        working-directory: app
        run: npm ci

      - name: Seed demo database
        run: python scripts/seed_demo.py

      - name: JavaScript syntax check
        run: node -c app/static/app.js

      - name: JavaScript unit tests
        run: node --test app/src/*.test.js

      - name: Python compile check
        run: python -m compileall -q app tests scripts

      - name: Python test suite
        run: python -m pytest -q tests

      - name: NPM high-severity audit
        working-directory: app
        run: npm audit --audit-level=high

      - name: Private footprint scan
        run: |
          ! rg -n -i --hidden -g '!.git/**' -g '!.github/workflows/ci.yml' -g '!venv/**' -g '!*.pyc' \
            'printery|the printery|blue ridge|framing studio|legacy software|simulart|katherine|jordan|sales@theprintery|prestonsburg|216 w court|freshdesk|/home/stacy|ollie@example|password jordan' .

      - name: Secret-ish text scan
        run: |
          ! rg -n --hidden -g '!.git/**' -g '!.github/workflows/ci.yml' -g '!venv/**' -g '!*.pyc' \
            '(api[_-]?key|secret[_-]?key|BEGIN .*PRIVATE KEY|token\s*=|password\s*=)' .
